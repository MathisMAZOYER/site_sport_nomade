version: '3.8'

services:
  db:
    image: postgres:15
    container_name: gym_db
    restart: always
    environment:
      POSTGRES_USER: gym
      POSTGRES_PASSWORD: gympass
      POSTGRES_DB: gymtracker
    volumes:
      - /volume2/sport/db:/var/lib/postgresql/data
    ports:
      - "54320:5432"

  backend:
    build: ./backend
    container_name: gym_api
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - db