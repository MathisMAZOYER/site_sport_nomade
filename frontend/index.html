<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gym Tracker</title>

<style>
body { font-family: Arial; margin:0; }
.topbar { display:flex; justify-content:space-between; padding:10px; background:#222; color:white; }
.users button { margin-right:10px; }
.active { background:green; color:white; }

.container { padding:20px; }
.card { border:1px solid #ccc; padding:10px; margin-bottom:10px; }
</style>
</head>

<body>

<div class="topbar">
  <div class="users" id="users"></div>
  <button onclick="createSession()">+ Nouvelle session</button>
</div>

<div class="container">

<h2 id="sessionTitle">Aucune session</h2>

<div class="card">
  <h3>Créer exercice</h3>
  <input id="exerciseName" placeholder="Nom exercice">
  <button onclick="createExercise()">Créer</button>
</div>

<div class="card">
  <h3>Ajouter performance</h3>

  <select id="exerciseSelect"></select>
  <input id="reps" type="number" placeholder="reps">
  <input id="weight" type="number" placeholder="weight">

  <button onclick="addSet()">Ajouter</button>
</div>

<div class="card">
  <h3>Session recap</h3>
  <div id="recap"></div>
</div>

</div>

<script>
const API = "https://api.sport.nomade.one";

let users = [];
let currentUser = null;
let currentSession = null;

// -------- USERS --------
async function loadUsers() {
  const res = await fetch(API + "/users");
  users = await res.json();
  renderUsers();
}

function renderUsers() {
  const div = document.getElementById("users");
  div.innerHTML = "";

  users.forEach(u => {
    const btn = document.createElement("button");
    btn.innerText = u.name;

    btn.onclick = () => {
      currentUser = u;
      currentSession = null;
      updateUI();
      renderUsers();
    };

    if (currentUser && u.id === currentUser.id) {
      btn.classList.add("active");
    }

    div.appendChild(btn);
  });
}

// -------- SESSION --------
async function createSession() {
  if (!currentUser) return alert("Select user");

  const res = await fetch(API + "/sessions", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      name: "Session " + new Date().toLocaleString(),
      user_id: currentUser.id
    })
  });

  const session = await res.json();
  currentSession = session;

  updateUI();
  loadRecap();
}

// -------- EXERCISES --------
async function loadExercises() {
  const res = await fetch(API + "/exercises");
  const data = await res.json();

  const select = document.getElementById("exerciseSelect");
  select.innerHTML = "";

  data.forEach(e => {
    const opt = document.createElement("option");
    opt.value = e.id;
    opt.text = e.name || ("Ex " + e.id);
    select.appendChild(opt);
  });
}

async function createExercise() {
  if (!currentUser) return alert("Select user");

  const name = document.getElementById("exerciseName").value;

  await fetch(API + "/exercises", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      name,
      creator_id: currentUser.id,
      shared: true
    })
  });

  loadExercises();
}

// -------- SETS --------
async function addSet() {
  if (!currentUser || !currentSession) {
    return alert("User + session required");
  }

  const exercise_id = parseInt(document.getElementById("exerciseSelect").value);
  const reps = parseInt(document.getElementById("reps").value);
  const weight = parseInt(document.getElementById("weight").value);

  await fetch(API + "/sets", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      user_id: currentUser.id,
      session_id: currentSession.id,
      exercise_id,
      reps,
      weight
    })
  });

  loadRecap();
}

// -------- RECAP --------
async function loadRecap() {
  if (!currentSession) return;

  try {
    // 🔥 endpoint filtré (à créer côté backend)
    const res = await fetch(API + `/sessions/${currentSession.id}/sets`);
    const sets = await res.json();

    const recap = document.getElementById("recap");
    recap.innerHTML = "";

    if (sets.length === 0) {
      recap.innerHTML = "<i>Aucune performance pour cette session</i>";
      return;
    }

    // 🔥 group by exercise
    const grouped = {};

    sets.forEach(s => {
      if (!grouped[s.exercise_id]) grouped[s.exercise_id] = [];
      grouped[s.exercise_id].push(s);
    });

    // 🔥 affichage
    for (let ex in grouped) {

      const container = document.createElement("div");
      container.style.marginBottom = "15px";

      const title = document.createElement("div");
      title.innerHTML = `<strong>Exercise ${ex}</strong>`;
      container.appendChild(title);

      // 🔥 tri par date (récent en bas)
      grouped[ex].sort((a, b) => new Date(a.created_at) - new Date(b.created_at));

      grouped[ex].forEach(set => {
        const line = document.createElement("div");
        line.innerText = `${set.reps} reps @ ${set.weight}kg`;
        container.appendChild(line);
      });

      recap.appendChild(container);
    }

  } catch (err) {
    console.error("Recap error:", err);
  }

  const sets = await res.json();
  renderRecap(sets);
}

function renderRecap(sets) {
  const recap = document.getElementById("recap");
  recap.innerHTML = "";

  const grouped = {};

  sets.forEach(s => {
    if (!grouped[s.exercise_id]) grouped[s.exercise_id] = [];
    grouped[s.exercise_id].push(s);
  });

  for (let ex in grouped) {
    const container = document.createElement("div");
    container.innerHTML = `<strong>Exercise ${ex}</strong>`;

    grouped[ex].forEach(set => {
      const row = document.createElement("div");

      row.innerHTML = `
        <input type="number" value="${set.reps}" id="reps-${set.id}" style="width:60px">
        <input type="number" value="${set.weight}" id="weight-${set.id}" style="width:60px">
        <button onclick="updateSet(${set.id})">💾</button>
      `;

      container.appendChild(row);
    });

    recap.appendChild(container);
  }
}

// SET - UPDATE CALL
async function updateSet(id) {
  const reps = parseInt(document.getElementById(`reps-${id}`).value);
  const weight = parseInt(document.getElementById(`weight-${id}`).value);

  await fetch(API + `/sets/${id}`, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ reps, weight })
  });

  // refresh recap
  loadRecap();
}

// -------- UI --------
function updateUI() {
  document.getElementById("sessionTitle").innerText =
    currentUser
      ? (currentSession
        ? `${currentUser.name} - Session ${currentSession.id}`
        : `${currentUser.name} (no session)`)
      : "No user selected";
}

// INIT
window.onload = () => {
  loadUsers();
  loadExercises();
  loadRecap();
};
</script>

</body>
</html>
