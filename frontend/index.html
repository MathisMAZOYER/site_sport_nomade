<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Gym Tracker</title>
  <style>
    body { font-family: Arial; margin: 0; }

    .topbar {
      display: flex;
      justify-content: space-between;
      padding: 10px;
      background: #222;
      color: white;
    }

    .users button {
      margin-right: 10px;
      padding: 8px;
      cursor: pointer;
    }

    .active {
      background: green;
      color: white;
    }

    .container {
      padding: 20px;
    }

    .card {
      border: 1px solid #ccc;
      padding: 10px;
      margin-bottom: 10px;
    }

    input, select {
      margin: 5px;
    }
  </style>
</head>

<body>

<div class="topbar">
  <div class="users">
    <button onclick="selectUser('Raf')" id="user_Raf">Raf</button>
    <button onclick="selectUser('Mathis')" id="user_Mathis">Mathis</button>
  </div>

  <button onclick="newSession()">+ Nouvelle session</button>
</div>

<div class="container">

  <h2 id="sessionTitle">Session : -</h2>

  <!-- ADD EXERCISE -->
  <div class="card">
    <h3>Ajouter exercice</h3>

    <input id="exerciseName" placeholder="Nouvel exercice">

    <button onclick="createExercise()">Créer</button>
  </div>

  <!-- SELECT EXISTING -->
  <div class="card">
    <h3>Exercices existants</h3>

    <select id="exerciseSelect"></select>

    <input id="reps" placeholder="reps" type="number">
    <input id="weight" placeholder="weight" type="number">

    <button onclick="savePerformance()">Save</button>
  </div>

  <!-- LIST -->
  <div class="card">
    <h3>Historique session</h3>
    <div id="history"></div>
  </div>

</div>

<script>
const API = "http://192.168.1.210:3000";

let currentUser = "Raf";
let currentSession = 1;
let sessionCounter = 1;

let sessionData = {
  Raf: {},
  Mathis: {}
};

// ---------------- USER ----------------
function selectUser(user) {
  currentUser = user;

  document.getElementById("user_Raf").classList.remove("active");
  document.getElementById("user_Mathis").classList.remove("active");

  document.getElementById("user_" + user).classList.add("active");

  loadExercises();
}

selectUser("Raf");

// ---------------- SESSION ----------------
function newSession() {
  currentSession++;
  sessionCounter++;

  document.getElementById("sessionTitle").innerText =
    `Session ${currentSession} - ${currentUser}`;

  sessionData[currentUser][currentSession] = [];

  document.getElementById("history").innerHTML = "";
}

// ---------------- EXERCISES ----------------
async function loadExercises() {
  const res = await fetch(API + "/exercises");
  const data = await res.json();

  const select = document.getElementById("exerciseSelect");
  select.innerHTML = "";

  data.forEach(ex => {
    const opt = document.createElement("option");
    opt.value = ex.id;
    opt.text = `#${ex.id} - ${ex.name || "exercise"}`;
    select.appendChild(opt);
  });
}

// CREATE EXERCISE
async function createExercise() {
  const name = document.getElementById("exerciseName").value;

  await fetch(API + "/exercises", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      creator_id: 1,
      shared: true,
      tracking: null // PROVISOIREEEEEE
    })
  });

  loadExercises();
}

// SAVE PERFORMANCE
function savePerformance() {
  const exId = document.getElementById("exerciseSelect").value;
  const reps = document.getElementById("reps").value;
  const weight = document.getElementById("weight").value;

  if (!sessionData[currentUser][currentSession]) {
    sessionData[currentUser][currentSession] = [];
  }

  sessionData[currentUser][currentSession].push({
    exercise_id: exId,
    reps,
    weight
  });

  renderHistory();
}

// ---------------- HISTORY ----------------
function renderHistory() {
  const div = document.getElementById("history");
  div.innerHTML = "";

  const data = sessionData[currentUser][currentSession] || [];

  data.forEach(item => {
    const el = document.createElement("div");
    el.innerHTML = `
      Exercise ${item.exercise_id}
      | reps: ${item.reps}
      | weight: ${item.weight}
    `;
    div.appendChild(el);
  });
}

loadExercises();

</script>

</body>
</html>
